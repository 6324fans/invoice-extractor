name: Build

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Tesseract + Chinese (system, for bundling OCR)
        shell: pwsh
        run: |
          choco install tesseract -y
          $tessdir = "C:\Program Files\Tesseract-OCR"
          $td = "$tessdir\tessdata"
          Invoke-WebRequest "https://github.com/tesseract-ocr/tessdata_fast/raw/main/chi_sim.traineddata" -OutFile "$td\chi_sim.traineddata"
          Invoke-WebRequest "https://github.com/tesseract-ocr/tessdata_fast/raw/main/chi_tra.traineddata" -OutFile "$td\chi_tra.traineddata"

      - name: Stage bundled Tesseract for PyInstaller
        shell: pwsh
        run: |
          $stage = "bundle_bin"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          $tessdir = "C:\Program Files\Tesseract-OCR"
          # Tesseract 主程序 + 运行所需 dll
          Copy-Item "$tessdir\tesseract.exe" $stage\
          Get-ChildItem "$tessdir\*.dll" -ErrorAction SilentlyContinue | Copy-Item -Destination $stage\
          # 中文语言包（放 bin 旁的 tessdata，代码按此查找）
          New-Item -ItemType Directory -Force -Path "bundle_tessdata" | Out-Null
          Copy-Item "$tessdir\tessdata\chi_sim.traineddata" "bundle_tessdata\"
          Copy-Item "$tessdir\tessdata\chi_tra.traineddata" "bundle_tessdata\"
          Copy-Item "$tessdir\tessdata\eng.traineddata" "bundle_tessdata\" -ErrorAction SilentlyContinue
          Write-Host "Bundled Tesseract:"; Get-ChildItem $stage | ForEach-Object { Write-Host "  $($_.Name)" }

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build exe (Tesseract bundled; PDF via PyMuPDF)
        shell: pwsh
        run: |
          pyinstaller --noconfirm --windowed --name invoice-extractor `
            --add-data "templates;templates" `
            --add-data "static;static" `
            --add-data "bundle_bin;bin" `
            --add-data "bundle_tessdata;tessdata" `
            --collect-all fitz `
            --hidden-import webview.platforms.edgechromium `
            --hidden-import pytesseract `
            main.py

      - name: Verify bundled Tesseract in dist
        shell: pwsh
        run: |
          # PyInstaller onedir: add-data 放在 _internal/ 下
          $base = "dist\invoice-extractor\_internal"
          if (-not (Test-Path $base)) { $base = "dist\invoice-extractor" }
          Write-Host "bin/:"; Get-ChildItem "$base\bin" -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  $($_.Name)" }
          Write-Host "tessdata/:"; Get-ChildItem "$base\tessdata" -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  $($_.Name)" }
          if (Test-Path "$base\bin\tesseract.exe") { Write-Host "✓ Tesseract 已内包" } else { Write-Host "✗ Tesseract 缺失"; exit 1 }
          if (Test-Path "$base\tessdata\chi_sim.traineddata") { Write-Host "✓ 中文包已内包" } else { Write-Host "✗ 中文包缺失"; exit 1 }

      - name: Zip Windows package
        shell: pwsh
        run: Compress-Archive -Path dist\invoice-extractor -DestinationPath invoice-extractor-windows.zip

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: invoice-extractor-windows
          path: invoice-extractor-windows.zip
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Compile OCR binary
        run: python -c "import ocr; ocr.ensure_ocr_binary()"

      - name: Build app (Quartz PDF + Vision OCR, no external deps)
        run: |
          pyinstaller --noconfirm --windowed \
            --name invoice-extractor \
            --add-data "wechat_ocr.swift:." \
            --add-data "templates:templates" \
            --add-data "static:static" \
            --hidden-import webview.platforms.cocoa \
            --hidden-import Quartz \
            --hidden-import Vision \
            --hidden-import AppKit \
            main.py

      - name: Zip macOS app
        run: ditto -c -k --keepParent dist/invoice-extractor.app invoice-extractor-mac.zip

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: invoice-extractor-macos
          path: invoice-extractor-mac.zip
          if-no-files-found: error

  release:
    needs: [build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: invoice-extractor-windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: invoice-extractor-macos

      - name: Create GitHub Release with assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            invoice-extractor-windows.zip
            invoice-extractor-mac.zip
          generate_release_notes: true
